<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Initial D cars</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffffff, #1a1a1a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: #cccccc;
    padding: 40px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 0 20px rgba(0, 179, 255, 0.2);
    text-align: center;
}

h2 {
    color: #00c8ff;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: #e3d7d7;
    color: white;
}

input:focus {
    outline: none;
    box-shadow: 0 0 5px #006aff;
}

button {
    width: 100%;
    padding: 10px;
    background: #00e5ff;
    border: none;
    border-radius: 8px;
    color: rgb(0, 0, 0);
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ccb1;
}

a {
    
    color: #20b359;
    text-decoration: none;
    font-size: 14px;
}

a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>
<div class="container">
    <h2>Initial D cars in real life</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="/register">Register</a></p>
</div>
</body>
</html>
