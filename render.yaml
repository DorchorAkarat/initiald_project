services:
  - type: web
    name: initiald-project
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: initiald-db
          property: connectionString

databases:
  - name: initiald-db
    plan: free
